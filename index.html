<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>单词蛇王</title>
    <style>
        :root { --neon: #00f2ff; --gold: #f1c40f; --epic: #ff00ff; }
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'PingFang SC', sans-serif; touch-action: none; color: white; user-select: none; }
        canvas { display: block; }
        .glass { background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; pointer-events: auto; }
        
        #hud { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        #menu { position: fixed; right: 10px; top: 80px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        
        #quiz-box { position: fixed; top: 12%; left: 50%; transform: translateX(-50%); text-align: center; display: none; z-index: 5; pointer-events: none; }
        #q-text { font-size: 42px; font-weight: bold; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-height: 80vh; overflow-y: auto; display: none; z-index: 1000; }
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin: 5px; cursor: pointer; }
        
        .word-card { display: inline-block; padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #333; min-width: 80px; text-align: center; }
        .unlocked { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); color: var(--gold); font-weight: bold; }
        
        #joy-base { position: fixed; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; bottom: 50px; left: 50px; display: none; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: var(--neon); border-radius: 50%; top: 30px; left: 30px; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="glass">💰 <span id="u-coins">0</span> | 🧩 <span id="u-shards">0</span></div>
        <div class="glass">🔥 Combo: <span id="u-combo">0</span> | ⭐ <span id="u-score">0</span></div>
    </div>

    <div id="menu">
        <div class="glass" onclick="openShop()">🛒 皮肤商店</div>
        <div class="glass" onclick="openBook()">📖 单词本</div>
        <div class="glass" onclick="shareGame()">👥 分数分享</div>
    </div>

    <div id="quiz-box">
        <div id="q-hint" style="font-size: 14px; color: #aaa;">请撞击正确意思：</div>
        <div id="q-text">Apple</div>
    </div>

    <div id="login-modal" class="glass modal">
        <h2 id="l-title">每日签到</h2>
        <p id="l-body"></p>
        <button class="btn" onclick="closeModal('login-modal')">开始战斗！</button>
    </div>

    <div id="shop-modal" class="glass modal">
        <h2>皮肤商店</h2>
        <p>100金币 = 1个随机碎片</p>
        <button class="btn" onclick="buyShard()">购买碎片</button>
        <hr>
        <div id="skin-list"></div>
        <button class="btn" style="background:#444; color:#fff" onclick="closeModal('shop-modal')">关闭</button>
    </div>

    <div id="book-modal" class="glass modal">
        <h2>我的收集 (已解锁: <span id="book-count">0</span>)</h2>
        <div id="book-grid"></div>
        <button class="btn" onclick="closeModal('book-modal')">关闭</button>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const wordBank = [
            {en: "Abandon", zh: "放弃"}, {en: "Ability", zh: "能力"}, {en: "Abnormal", zh: "异常的"},
            {en: "Aboard", zh: "在船上"}, {en: "Abolish", zh: "废除"}, {en: "Abrupt", zh: "突然的"},
            {en: "Absence", zh: "缺席"}, {en: "Absolute", zh: "绝对的"}, {en: "Absorb", zh: "吸收"},
            {en: "Abstract", zh: "抽象的"}, {en: "Academic", zh: "学术的"}, {en: "Accent", zh: "口音"},
            {en: "Accept", zh: "接受"}, {en: "Access", zh: "入口"}, {en: "Accident", zh: "事故"},
            {en: "Accommodate", zh: "容纳"}, {en: "Accompany", zh: "陪伴"}, {en: "Account", zh: "账户"},
            {en: "Accuracy", zh: "准确性"}, {en: "Achieve", zh: "实现"}, {en: "Analyze", zh: "分析"},
            {en: "Baggage", zh: "行李"}, {en: "Balance", zh: "平衡"}, {en: "Barrier", zh: "障碍"},
            {en: "Calculate", zh: "计算"}, {en: "Campaign", zh: "活动"}, {en: "Candidate", zh: "候选人"}
        ];

        let storage = {
            coins: parseInt(localStorage.getItem('sw_coins')) || 0,
            shards: parseInt(localStorage.getItem('sw_shards')) || 0,
            unlocked: JSON.parse(localStorage.getItem('sw_unlocked') || "[]"),
            wrong: JSON.parse(localStorage.getItem('sw_wrong') || "[]"),
            streak: parseInt(localStorage.getItem('sw_streak')) || 0,
            lastDate: localStorage.getItem('sw_date') || "",
            skinId: 0
        };

        const skins = [
            { name: "系统蓝", need: 0, color: "#00f2ff" },
            { name: "翡翠绿", need: 10, color: "#2ed573" },
            { name: "土豪金", need: 20, color: "#f1c40f" },
            { name: "幻彩紫", need: 30, color: "#ff00ff" }
        ];

        let game = {
            score: 0, combo: 0, lastEat: 0,
            diff: 1, double: false, slow: false,
            isQuiz: false, current: null,
            camX: 0, camY: 0
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 0, y: 0, angle: 0, speed: 5, body: [], len: 10 };
        let items = [], options = [], chests = [];
        let joystick = { active: false, x: 0, y: 0, sx: 0, sy: 0 };

        function init() {
            window.addEventListener('resize', resize); 
            resize();
            
            // 初始化玩家位置到中心
            player.x = 0; player.y = 0;
            for(let i=0; i<player.len*5; i++) player.body.push({x:0, y:0});

            for(let i=0; i<30; i++) spawnItem();
            for(let i=0; i<3; i++) spawnChest();
            
            checkDaily();
            updateUI();
            bindEvents();
            requestAnimationFrame(loop);
        }

        function spawnItem(isReview = false) {
            let w = (isReview && storage.wrong.length > 0) ? storage.wrong.shift() : wordBank[Math.floor(Math.random()*wordBank.length)];
            items.push({ ...w, x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, review: isReview });
        }

        function spawnChest() {
            chests.push({ x: (Math.random()-0.5)*2500, y: (Math.random()-0.5)*2500, type: Math.floor(Math.random()*3) });
        }

        function loop() {
            let spd = game.slow ? player.speed * 0.5 : player.speed;
            
            if(joystick.active) {
                player.x += joystick.x * spd; 
                player.y += joystick.y * spd;
                player.angle = Math.atan2(joystick.y, joystick.x);
            }

            // 平滑相机跟随
            game.camX += (player.x - game.camX) * 0.1;
            game.camY += (player.y - game.camY) * 0.1;

            player.body.unshift({x: player.x, y: player.y});
            if(player.body.length > player.len * 5) player.body.pop();

            checkCollisions();
            checkCombo();
            draw();
            requestAnimationFrame(loop);
        }

        function checkCollisions() {
            if(game.isQuiz) {
                options.forEach(opt => {
                    if(Math.hypot(opt.x - player.x, opt.y - player.y) < 50) handleAnswer(opt.correct);
                });
                return;
            }
            items.forEach((it, i) => {
                if(Math.hypot(it.x - player.x, it.y - player.y) < 40) {
                    startQuiz(it); items.splice(i, 1);
                }
            });
            chests.forEach((c, i) => {
                if(Math.hypot(c.x - player.x, c.y - player.y) < 40) {
                    triggerChest(c.type); chests.splice(i, 1); setTimeout(spawnChest, 8000);
                }
            });
        }

        function startQuiz(it) {
            game.isQuiz = true; 
            game.current = it;
            document.getElementById('quiz-box').style.display = 'block';
            let qText = document.getElementById('q-text');
            
            let answers = [it.zh];
            qText.innerText = it.en;
            let count = game.diff >= 2 ? 4 : 2;
            while(answers.length < count) {
                let r = wordBank[Math.floor(Math.random()*wordBank.length)].zh;
                if(!answers.includes(r)) answers.push(r);
            }
            
            answers.sort(() => Math.random()-0.5);
            options = answers.map((a, i) => ({
                text: a, correct: a === it.zh,
                x: player.x + Math.cos(i * (Math.PI*2/count)) * 200, 
                y: player.y + Math.sin(i * (Math.PI*2/count)) * 200
            }));
        }

        function handleAnswer(isCorrect) {
            game.isQuiz = false; 
            options = [];
            document.getElementById('quiz-box').style.display = 'none';
            
            if(isCorrect) {
                game.score += (game.double ? 20 : 10);
                game.combo++; 
                game.lastEat = Date.now(); 
                player.len += 2;
                if(game.current && !storage.unlocked.includes(game.current.en)) storage.unlocked.push(game.current.en);
            } else {
                if(game.current) storage.wrong.push(game.current);
                game.combo = 0;
            }
            spawnItem(); save(); updateUI();
        }

        function triggerChest(type) {
            if(type === 0) { game.double = true; setTimeout(()=>game.double=false, 10000); alert("双倍得分！"); }
            else if(type === 1) { storage.shards++; alert("获得皮肤碎片！"); }
            else { storage.coins += 50; alert("获得50金币！"); }
            save(); updateUI();
        }

        function draw() {
            ctx.fillStyle = '#050510'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const ox = canvas.width/2 - game.camX;
            const oy = canvas.height/2 - game.camY;
            
            // 网格背景
            ctx.strokeStyle = '#112';
            ctx.lineWidth = 1;
            for(let i=-2000; i<=2000; i+=100) {
                ctx.beginPath(); ctx.moveTo(i+ox, -2000+oy); ctx.lineTo(i+ox, 2000+oy); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-2000+ox, i+oy); ctx.lineTo(2000+ox, i+oy); ctx.stroke();
            }

            // 绘制题目选项
            options.forEach(opt => {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
                ctx.beginPath(); ctx.arc(opt.x+ox, opt.y+oy, 50, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = varColor('--neon'); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = "bold 18px Arial"; ctx.textAlign = 'center';
                ctx.fillText(opt.text, opt.x+ox, opt.y+oy+7);
            });

            // 绘制单词点
            items.forEach(it => {
                ctx.fillStyle = it.review ? '#f44' : '#fff';
                ctx.beginPath(); ctx.arc(it.x+ox, it.y+oy, 12, 0, Math.PI*2); ctx.fill();
                ctx.font = "14px Arial"; ctx.fillText(it.en, it.x+ox, it.y+oy+30);
            });

            // 绘制宝箱
            chests.forEach(c => { 
                ctx.fillStyle = '#f1c40f'; 
                ctx.shadowBlur = 10; ctx.shadowColor = '#f1c40f';
                ctx.fillRect(c.x+ox-15, c.y+oy-15, 30, 30);
                ctx.shadowBlur = 0;
            });

            // 绘制蛇
            player.body.forEach((b, i) => {
                if(i % 3 !== 0) return;
                ctx.fillStyle = skins[storage.skinId].color;
                ctx.globalAlpha = 1 - (i / player.body.length);
                ctx.beginPath(); ctx.arc(b.x+ox, b.y+oy, 18 - (i/player.body.length)*10, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function bindEvents() {
            const start = (e) => {
                const t = e.touches ? e.touches[0] : e;
                joystick.active = true; joystick.sx = t.clientX; joystick.sy = t.clientY;
                const jb = document.getElementById('joy-base');
                jb.style.display = 'block'; jb.style.left = (t.clientX-50)+'px'; jb.style.top = (t.clientY-50)+'px';
            };
            const move = (e) => {
                if(!joystick.active) return;
                const t = e.touches ? e.touches[0] : e;
                const dx = t.clientX - joystick.sx, dy = t.clientY - joystick.sy;
                const dist = Math.hypot(dx, dy), ang = Math.atan2(dy, dx);
                joystick.x = Math.cos(ang); joystick.y = Math.sin(ang);
                document.getElementById('joy-stick').style.transform = `translate(${Math.cos(ang)*Math.min(dist,35)}px, ${Math.sin(ang)*Math.min(dist,35)}px)`;
            };
            const end = () => { joystick.active = false; document.getElementById('joy-base').style.display = 'none'; };

            canvas.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', end);
            canvas.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        }

        function openShop() {
            let list = document.getElementById('skin-list'); list.innerHTML = "";
            skins.forEach((s, i) => {
                let can = storage.shards >= s.need;
                list.innerHTML += `<div style="margin:10px; color:${s.color}">${s.name} (${s.need}碎片) 
                    <button class="btn" onclick="unlockSkin(${i})" ${can?'':'disabled'}>${storage.skinId==i?'使用中':'切换'}</button></div>`;
            });
            document.getElementById('shop-modal').style.display = 'block';
        }
        function buyShard() {
            if(storage.coins >= 100) { storage.coins -= 100; storage.shards++; save(); updateUI(); }
            else alert("金币不足！");
        }
        function unlockSkin(id) { storage.skinId = id; save(); openShop(); }
        function openBook() {
            let grid = document.getElementById('book-grid'); grid.innerHTML = "";
            wordBank.forEach(w => {
                let has = storage.unlocked.includes(w.en);
                grid.innerHTML += `<div class="word-card ${has?'unlocked':''}"> ${has ? w.en + '<br>' + w.zh : '???'}</div>`;
            });
            document.getElementById('book-count').innerText = storage.unlocked.length;
            document.getElementById('book-modal').style.display = 'block';
        }
        function save() {
            localStorage.setItem('sw_coins', storage.coins); localStorage.setItem('sw_shards', storage.shards);
            localStorage.setItem('sw_unlocked', JSON.stringify(storage.unlocked));
            localStorage.setItem('sw_wrong', JSON.stringify(storage.wrong));
            localStorage.setItem('sw_streak', storage.streak); localStorage.setItem('sw_date', storage.lastDate);
        }
        function updateUI() {
            document.getElementById('u-coins').innerText = storage.coins;
            document.getElementById('u-shards').innerText = storage.shards;
            document.getElementById('u-combo').innerText = game.combo;
            document.getElementById('u-score').innerText = game.score;
        }
        function checkDaily() {
            let today = new Date().toDateString();
            if(storage.lastDate !== today) {
                storage.coins += 100; storage.lastDate = today;
                document.getElementById('l-body').innerText = "欢迎回来！送你 100 金币签到奖励。";
                document.getElementById('login-modal').style.display = 'block';
                save();
            }
        }
        function checkCombo() { if(game.combo > 0 && Date.now() - game.lastEat > 15000) { game.combo = 0; updateUI(); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function shareGame() { prompt("复制分数发给朋友：", `我在单词蛇王拿到了 ${game.score} 分，你也来试试？`); }

        init();
    </script>
</body>
</html>
